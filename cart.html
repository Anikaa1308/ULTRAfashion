<!DOCTYPE html>
<html lang="en">
<head>
    <title>ULTRA | Cart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo">ULTRA</div>
    <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="new-arrival.html">New Arrival</a>
        <div class="dropdown">
            <a href="clothes.html">Clothes ▾</a>

                <a href="clothes.html#bottoms">Pants & Trousers</a>

    <div style="text-align:right;">
        <h3>Total: <span id="cart-total">₹0</span></h3>
        <button onclick="checkout()" style="background:#1a1a1a; color:white; padding:15px 40px; margin-top:20px; border:none; cursor:pointer;">CHECKOUT</button>

<script src="script.js"></script>
